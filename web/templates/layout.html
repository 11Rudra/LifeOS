<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>{{ model.title }}</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
    <style>
        :root {
            --bg: #07111f;
            --panel: rgba(255,255,255,0.92);
            --accent: #5b7cff;
            --accent-2: #34d1bf;
            --text: #11213d;
        }
        body {
            background: radial-gradient(circle at top left, #18314f 0%, var(--bg) 55%, #030711 100%);
            padding-top: 2rem;
            color: var(--text);
            min-height: 100vh;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }
        .container {
            position: relative;
            z-index: 2;
        }
        .hero-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.98), rgba(242,247,255,0.95));
            border: 1px solid rgba(91,124,255,0.16);
            border-radius: 24px;
            box-shadow: 0 20px 45px rgba(5, 12, 24, 0.22);
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        .hero-card::before {
            content: "";
            position: absolute;
            inset: -20% auto auto -10%;
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, rgba(52,209,191,0.28), transparent 70%);
            pointer-events: none;
        }
        .hero-card::after {
            content: "";
            position: absolute;
            right: -30px;
            top: -30px;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(91,124,255,0.2), transparent 70%);
            pointer-events: none;
        }
        .eyebrow {
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: 700;
        }
        .mini-panel {
            background: linear-gradient(135deg, #f4f7ff, #eaf9f7);
            border-radius: 16px;
            padding: 1rem 1.2rem;
            border: 1px solid rgba(91,124,255,0.12);
        }
        .card-link { color: inherit; text-decoration: none; }
        .card-link:hover { text-decoration: none; }
        .card {
            border: 0;
            border-radius: 16px;
            box-shadow: 0 12px 24px rgba(5, 12, 24, 0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            background: var(--panel);
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 16px 32px rgba(5, 12, 24, 0.14); }
        .doc-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.98), rgba(242,247,255,0.95));
            border-radius: 22px;
            box-shadow: 0 20px 45px rgba(5, 12, 24, 0.18);
            padding: 2rem;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { margin-top: 1rem; margin-bottom: 0.6rem; }
        .markdown-body ul { padding-left: 1.2rem; }
        .form-control { border-radius: 10px; border: 1px solid #d7e0f3; }
        .btn { border-radius: 10px; }
        .btn-primary { background: linear-gradient(135deg, var(--accent), #3f65ff); border: none; }
        .badge-info { background: linear-gradient(135deg, var(--accent-2), #4fa6ff); color: white; }
        .floating-orb {
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.45;
            animation: drift 7s ease-in-out infinite alternate;
            pointer-events: none;
        }
        .orb-blue { background: #5b7cff; top: 10px; right: 30px; }
        .orb-teal { background: #34d1bf; bottom: 10px; left: 10px; animation-delay: 2s; }
        @keyframes drift {
            from { transform: translateY(0px) scale(1); }
            to { transform: translateY(20px) scale(1.08); }
        }
    </style>
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
        <footer class="text-muted text-center mt-4">LifeOS is ready to guide your week.</footer>
    </div>
</body>
</html>
