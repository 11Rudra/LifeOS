{% extends "layout.html" %}
{% block content %}
<div class="hero-card">
    <h1>{{ model.title }}</h1>
    <p class="lead">Capture notes, reflections, wins, and ideas that matter to your life.</p>
    <form method="post" action="/entries" class="mt-4">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" class="form-control" id="title" name="title" required>
        </div>
        <div class="form-group">
            <label for="category">Category</label>
            <input type="text" class="form-control" id="category" name="category" placeholder="Health, Family, Learning, Work" required>
        </div>
        <div class="form-group">
            <label for="content">Entry</label>
            <textarea class="form-control" id="content" name="content" rows="4" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Save Entry</button>
    </form>
</div>

<div class="row mt-4">
    {% for entry in model.entries %}
    <div class="col-md-6 mb-3">
        <div class="card h-100">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <h5 class="card-title mb-0">{{ entry.title }}</h5>
                    <span class="badge badge-info">{{ entry.category }}</span>
                </div>
                <p class="text-muted small mt-2">{{ entry.created_at }}</p>
                <p class="card-text">{{ entry.content }}</p>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
